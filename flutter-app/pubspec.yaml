name: quiz_battle
description: Live Quiz Battle — real-time multiplayer quiz app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── gRPC & Protobuf ───────────────────────────────────────────
  grpc: ^3.2.4                    # gRPC client (server streaming support)
  protobuf: ^3.1.0                # generated proto message classes
  fixnum: ^1.1.0                  # Int64 type used in proto messages

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1        # Riverpod for Flutter widgets
  riverpod_annotation: ^2.3.5     # @riverpod code-gen annotations

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^13.2.0              # declarative routing

  # ── Animations ────────────────────────────────────────────────
  animations: ^2.0.11             # Material motion transitions
  flutter_animate: ^4.5.0         # chainable animation helpers

  # ── Persistence ───────────────────────────────────────────────
  shared_preferences: ^2.2.2      # token + credential persistence

  # ── Authentication ────────────────────────────────────────────
  google_sign_in: ^6.2.1          # Google OAuth 2.0 / OIDC sign-in
  http: ^1.2.1                    # REST call to /auth/google endpoint

  # ── Images ────────────────────────────────────────────────────
  cached_network_image: ^3.3.1    # Google profile picture (CDN, with memory cache)

  # ── Payments ──────────────────────────────────────────────────
  razorpay_flutter: ^1.3.6        # Razorpay checkout SDK

  # ── Push Notifications (FCM) ──────────────────────────────────
  firebase_core: ^3.3.0           # Firebase app initialisation
  firebase_messaging: ^15.1.0     # FCM token + foreground/background messages

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
